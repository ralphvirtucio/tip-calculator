<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png" />

    <title>Frontend Mentor | Tip calculator app</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@700&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <script defer src="main.js"></script>
  </head>
  <body>
    <header class="header">
      <img src="./images/logo.svg" alt="Logo" role="heading" />
    </header>
    <main class="main">
      <form class="form">
        <section class="col--1">
          <div class="input__container">
            <div class="input__validation">
              <label for="bill">Bill</label>
              <p class="invalid__message">Can't be zero</p>
            </div>
            <div class="form__control-field">
              <input type="number" id="bill" class="input__tip" />
            </div>
          </div>

          <fieldset class="select-tip">
            <legend class="select-tip__heading">Select Tip %</legend>
            <label for="five-percent" class="select-tip__control">
              <input
                type="radio"
                name="tips"
                id="five-percent"
                value="0.05"
                class="select-tip__radio" />
              5%
            </label>

            <label for="ten-percent" class="select-tip__control">
              <input
                type="radio"
                name="tips"
                id="ten-percent"
                value="0.1"
                class="select-tip__radio" />
              10%
            </label>

            <label for="fifteen-percent" class="select-tip__control">
              <input
                type="radio"
                name="tips"
                id="fifteen-percent"
                value="0.15"
                class="select-tip__radio" />
              15%
            </label>

            <label for="twenty-five-percent" class="select-tip__control">
              <input
                type="radio"
                name="tips"
                id="twenty-five-percent"
                value="0.25"
                class="select-tip__radio" />
              25%
            </label>

            <label for="fifty-percent" class="select-tip__control">
              <input
                type="radio"
                name="tips"
                id="fifty-percent"
                value="0.5"
                class="select-tip__radio" />
              50%
            </label>
            <div class="select-tip__control--custom">
              <input
                type="number"
                placeholder="Custom"
                class="select-tip__custom-input"
                name="tips" />
            </div>
          </fieldset>

          <div class="input__container">
            <div class="input__validation">
              <label for="people">Number of People</label>
              <p class="invalid__message">Can't be zero</p>
            </div>
            <div class="form__control-field">
              <input type="number" id="people" class="input__tip" />
            </div>
          </div>
        </section>

        <section class="col--2">
          <div class="tip-total__container">
            <div class="tip-total">
              <div class="tip-total__label">
                <p class="tip-total__label--1">Tip Amount</p>
                <p class="tip-total__label--2">/ person</p>
              </div>
              <p class="tip-total__amount">$0.00</p>
            </div>

            <div class="tip-total">
              <div class="tip-total__label">
                <p class="tip-total__label--1">Total</p>
                <p class="tip-total__label--2">/ person</p>
              </div>
              <p class="tip-total__amount">$0.00</p>
            </div>
          </div>

          <button type="submit" class="tip__reset-btn">Reset</button>
        </section>
      </form>
    </main>
    <!-- 
  Bill

  Select Tip %
  5%
  10%
  15%
  25%
  50%
  Custom

  Number of People

  Tip Amount
  / person

  Total
  / person

  Reset -->
  </body>
</html>
